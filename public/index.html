<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Photobooth</title>
  <link rel="stylesheet" href="tailwind.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-background text-foreground font-sans overflow-hidden select-none">
  <div id="app" class="relative w-full h-full">

    <!-- Live Preview (always visible) -->
    <div id="preview-container" class="absolute inset-0 z-0 flex items-center justify-center bg-black">
      <img id="preview" class="w-full h-full object-cover mirror" alt="Camera Preview">
      <div id="no-signal" class="absolute inset-0 flex flex-col items-center justify-center gap-4 text-muted-foreground">
        <svg class="w-16 h-16 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Z"/>
        </svg>
        <span class="text-lg">Waiting for camera feed...</span>
      </div>
    </div>

    <!-- "Look here" camera indicator (visible during idle + session, hidden during countdown) -->
    <div id="look-indicator" class="look-indicator hidden">
      <div id="look-arrow" class="look-arrow"></div>
      <span id="look-text" class="look-text"></span>
    </div>

    <!-- Screen 1: Idle -->
    <div id="screen-idle" class="screen active">
      <div class="mt-auto flex flex-col items-center pb-12">
        <button id="btn-start" class="btn-primary-action">
          Start Session
        </button>
      </div>
    </div>

    <!-- Screen 2: Session Active -->
    <div id="screen-session" class="screen">
      <div class="flex justify-end p-6">
        <button id="btn-end-session" class="inline-flex items-center gap-2 rounded-xl border border-white/20 bg-black/50 backdrop-blur-lg px-10 py-5 text-2xl font-semibold text-white shadow-lg transition-colors hover:bg-black/70">
          End Session
        </button>
      </div>
      <div class="mt-auto flex flex-col items-center gap-5 pb-8">
        <div id="thumbnail-strip" class="flex gap-3 overflow-x-auto max-w-full px-4 py-2 no-scrollbar rounded-xl bg-black/30 backdrop-blur-sm"></div>
        <button id="btn-capture" class="capture-btn" disabled>
          <span class="capture-btn-inner"></span>
        </button>
      </div>
    </div>

    <!-- Screen 3: Countdown Overlay -->
    <div id="screen-countdown" class="overlay">
      <div id="countdown-number" class="text-[180px] font-black text-white countdown-pulse" style="text-shadow: 0 0 60px rgba(0,0,0,0.7);"></div>
    </div>

    <!-- Flash Overlay -->
    <div id="flash-overlay" class="overlay flash-overlay"></div>

    <!-- Screen 4: End Session / Contact Info -->
    <div id="screen-contact" class="screen">
      <div class="flex flex-col h-full">
        <!-- Top section: form card -->
        <div class="flex-1 flex items-center justify-center pt-6 pb-2">
          <div class="w-full max-w-2xl rounded-xl border border-border bg-card/90 backdrop-blur-xl p-10 shadow-2xl space-y-6">
            <div class="text-center space-y-1.5">
              <h2 class="text-4xl font-bold tracking-tight">Session Complete</h2>
              <p id="photo-count-msg" class="text-xl text-muted-foreground"></p>
            </div>
            <div class="space-y-3">
              <div id="group-email" class="space-y-1.5">
                <label for="input-email" class="text-lg font-medium text-muted-foreground">Email</label>
                <input type="text" id="input-email" readonly placeholder="your@email.com"
                  class="flex h-16 w-full rounded-lg border border-input bg-background px-5 text-2xl text-foreground placeholder:text-muted-foreground/40 focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2 focus:ring-offset-background transition-all">
              </div>
              <div id="group-phone" class="space-y-1.5">
                <label for="input-phone" class="text-lg font-medium text-muted-foreground">Phone</label>
                <input type="text" id="input-phone" readonly placeholder="(555) 123-4567"
                  class="flex h-16 w-full rounded-lg border border-input bg-background px-5 text-2xl text-foreground placeholder:text-muted-foreground/40 focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2 focus:ring-offset-background transition-all">
              </div>
            </div>
            <p id="form-hint" class="text-base text-center text-muted-foreground">Enter your email and/or phone number to receive your photos.</p>
            <button id="btn-submit" class="btn-primary-action w-full text-2xl">
              Submit &amp; Finish
            </button>
          </div>
        </div>
        <!-- Bottom section: on-screen keyboard -->
        <div id="keyboard" class="keyboard-container"></div>
      </div>
    </div>

    <!-- Processing overlay -->
    <div id="screen-processing" class="overlay">
      <div class="flex flex-col items-center gap-4">
        <div class="processing-spinner"></div>
        <span class="text-lg font-medium text-white">Capturing...</span>
      </div>
    </div>

    <!-- Success confirmation overlay -->
    <div id="screen-success" class="overlay">
      <div class="flex flex-col items-center gap-4 text-center px-8">
        <svg class="w-20 h-20 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
        </svg>
        <h2 class="text-4xl font-bold text-white">Success!</h2>
        <p class="text-2xl text-white/80">Your photos will be sent to you soon.</p>
      </div>
    </div>
  </div>

  <!-- Validation toast popup -->
  <div id="toast" class="toast"></div>

  <script src="kiosk.js"></script>
  <script src="keyboard.js"></script>
  <script src="validation.js"></script>
  <script src="look-indicator.js"></script>
  <script src="app.js"></script>
</body>
</html>
